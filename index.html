<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتاب الحب الأبدي - ريماس & وسيم</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: radial-gradient(circle at center, #1f0000 0%, #000000 90%); color: #fff; font-family: 'Amiri', serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        #explosion-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10000; }
        .password-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1f0000 0%, #000000 90%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; padding: 20px; text-align: center; transition: opacity 1s ease; }
        .password-box { background: rgba(139, 0, 0, 0.15); border: 1px solid #8B0000; padding: 35px 25px; border-radius: 20px; box-shadow: 0 0 30px rgba(139, 0, 0, 0.6); max-width: 450px; width: 100%; backdrop-filter: blur(5px); }
        .password-box h2 { font-family: 'Cairo', sans-serif; font-size: 20px; color: #ffcccc; margin-bottom: 25px; line-height: 1.6; text-shadow: 0 0 10px rgba(255, 0, 0, 0.5); }
        .password-box input { width: 100%; padding: 14px; border-radius: 30px; border: 1px solid #ff4d4d; background: rgba(0, 0, 0, 0.7); color: white; font-size: 18px; text-align: center; margin-bottom: 15px; outline: none; font-family: 'Cairo', sans-serif; transition: all 0.3s ease; }
        .password-box input:focus { box-shadow: 0 0 15px #ff0000; border-color: #ff0000; }
        .password-error { color: #ff3333; font-family: 'Cairo', sans-serif; font-size: 14px; margin-bottom: 15px; display: none; animation: shake 0.4s ease; }
        .book-container { width: 100%; max-width: 600px; padding: 20px; text-align: center; position: relative; height: 90vh; display: flex; flex-direction: column; justify-content: center; opacity: 0; transform: scale(0.9); transition: all 1.5s ease; overflow-y: auto; }
        .book-visible { opacity: 1 !important; transform: scale(1) !important; }
        .page { display: none; animation: pageFlip 0.8s ease-in-out forwards; }
        .active { display: block; }
        .heart-container { display: flex; justify-content: center; align-items: center; margin-bottom: 20px; position: relative; }
        .rope { width: 80px; height: 4px; background: linear-gradient(90deg, #666, #ccc, #666); border-radius: 5px; box-shadow: 0 0 10px rgba(255,255,255,0.3); margin: 0 -20px; z-index: 1; }
        .heart-wrapper { position: relative; width: 100px; height: 95px; display: flex; justify-content: center; align-items: center; z-index: 2; animation: pulse 2.5s infinite ease-in-out; }
        .heart-wrapper:nth-child(3) { animation-delay: 0.6s; }
        .svg-heart { position: absolute; top: 0; left: 0; width: 100%; height: 100%; fill: #8B0000; filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.8)); z-index: 1; }
        .name-text { position: relative; z-index: 3; color: #fff; font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 18px; margin-top: -10px; text-shadow: 2px 2px 6px rgba(0,0,0,0.9); }
        h1 { font-family: 'Cairo', sans-serif; font-size: 26px; color: #ffcccc; margin-bottom: 15px; text-shadow: 0 0 15px rgba(255, 0, 0, 0.6); }
        .content-text { color: #f8f8f8; font-size: 20px; line-height: 1.8; margin: 15px 0; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); }
        .poem-text { font-style: italic; color: #ffb3b3; font-size: 22px; line-height: 2; border-right: 4px solid #8B0000; border-left: 4px solid #8B0000; padding: 10px 20px; margin: 15px auto; max-width: 90%; background: rgba(139, 0, 0, 0.1); border-radius: 10px; }
        .page-number { font-size: 16px; color: #999; margin-top: 15px; font-family: 'Cairo', sans-serif; }
        .jump-nav { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 15px; padding: 10px; background: rgba(139, 0, 0, 0.1); border-radius: 15px; border: 1px solid rgba(255, 77, 77, 0.3); }
        .jump-nav label { font-family: 'Cairo', sans-serif; font-size: 14px; color: #ffcccc; }
        .jump-nav input { width: 70px; padding: 8px; border-radius: 15px; border: 1px solid #ff4d4d; background: rgba(0, 0, 0, 0.6); color: white; text-align: center; font-family: 'Cairo', sans-serif; font-size: 14px; outline: none; }
        .jump-nav button { padding: 8px 15px; font-size: 13px; margin: 0; }
        .live-users-counter { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 10px; font-family: 'Cairo', sans-serif; font-size: 14px; color: #ccc; }
        .mini-heart { width: 18px; height: 18px; fill: #ff3333; animation: pulse 1.2s infinite ease-in-out; filter: drop-shadow(0 0 5px #ff0000); }
        .user-count-badge { background: rgba(255, 0, 0, 0.2); border: 1px solid #ff3333; padding: 2px 10px; border-radius: 12px; color: #fff; font-weight: bold; }
        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        button { background: linear-gradient(135deg, #8B0000 0%, #4a0000 100%); color: white; border: 1px solid #ff4d4d; padding: 12px 25px; border-radius: 30px; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: bold; transition: all 0.3s ease; box-shadow: 0 0 15px rgba(139, 0, 0, 0.7); }
        button:hover { transform: translateY(-3px); box-shadow: 0 0 20px #ff0000; }
        button:active { transform: scale(0.95); }
        .ai-loading { display: none; color: #ffcccc; font-family: 'Cairo'; margin-top: 10px; animation: pulse 1s infinite; font-size: 14px; }
        @keyframes pageFlip { from { opacity: 0; transform: rotateY(-20deg) scale(0.9); filter: blur(5px); } to { opacity: 1; transform: rotateY(0deg) scale(1); filter: blur(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>
    <canvas id="explosion-canvas"></canvas>    <div class="password-overlay" id="passwordOverlay">
        <div class="password-box">
            <h2>للدخول كتاب الحب للابد يجب عليك ادخال كلمة السر</h2>
            <input type="text" id="passwordInput" placeholder="اكتب كلمة السر هنا..." onkeypress="if(event.key==='Enter') validatePassword()">
            <div class="password-error" id="passwordError">كلمة السر خاطئة، يرجى المحاولة مرة أخرى</div>
            <button onclick="validatePassword()">دخول للكتاب 💖</button>
        </div>
    </div>
    <div class="book-container" id="bookContainer" style="display: none;">
        <div id="pages-container"></div>
        <div class="ai-loading" id="aiLoading">✨ الذكاء الاصطناعي يكتب صفحات حب جديدة...</div>
    </div>

    <script>
        // ⚠️ ضع مفتاح OpenRouter الجديد الخاص بك هنا بين علامتي التنصيص
        const OPENROUTER_API_KEY =  "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"; 
        
        const BOOK_START_DATE = new Date("2026-06-16T00:00:00");
        const NEW_PAGES_PER_CYCLE = 20;
        const CYCLE_DAYS = 3;
        
        // --- نظام انفجار القلوب ---
        const canvas = document.getElementById('explosion-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();
        class HeartParticle {
            constructor(x, y, isBig) {
                this.x = x; this.y = y;
                const speed = isBig ? Math.random() * 8 + 2 : Math.random() * 4 + 1;
                const angle = Math.random() * Math.PI * 2;
                this.vx = Math.cos(angle) * speed; this.vy = Math.sin(angle) * speed;
                this.size = Math.random() * (isBig ? 15 : 8) + 5;
                this.color = `hsl(${Math.random() * 40 + 340}, 100%, ${Math.random() * 30 + 50}%)`;
                this.alpha = 1; this.decay = Math.random() * 0.015 + 0.005; this.gravity = 0.05;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += this.gravity; this.alpha -= this.decay; this.size *= 0.98; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.beginPath();
                const s = this.size / 2; ctx.moveTo(this.x, this.y);
                ctx.bezierCurveTo(this.x - s, this.y - s, this.x - s * 2, this.y + s / 2, this.x, this.y + s * 2);
                ctx.bezierCurveTo(this.x + s * 2, this.y + s / 2, this.x + s, this.y - s, this.x, this.y);
                ctx.fill(); ctx.restore();
            }
        }
        function createExplosion(x, y, count = 100) { for (let i = 0; i < count; i++) particles.push(new HeartParticle(x, y, count > 50)); }
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.alpha > 0);            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // --- دالة التحقق من كلمة السر ---
        function validatePassword() {
            const input = document.getElementById('passwordInput').value;
            if (input.includes("وسيم") && input.includes("ريماس")) {
                createExplosion(window.innerWidth / 2, window.innerHeight / 2, 200);
                const overlay = document.getElementById('passwordOverlay');
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    const book = document.getElementById('bookContainer');
                    book.style.display = 'flex';
                    setTimeout(() => book.classList.add('book-visible'), 50);
                    checkAndGenerateAIPages();
                }, 800);
            } else {
                const err = document.getElementById('passwordError');
                err.style.display = 'block';
                err.style.animation = 'none'; err.offsetHeight; err.style.animation = 'shake 0.4s ease';
            }
        }

        // ==========================================
        // جميع الصفحات الأصلية الـ 100 كاملة
        // ==========================================
        const basePages = [
            { title: "بِدَايَةُ الحِكَايَة", content: "هنا تُكتب حكايتنا الحقيقية، بين نبضة ونبضة. وفي كل صفحة نروي قصة حب لا تطويها الأيام، قصة تبدأ بكِ وتنتهي إليكِ.", type: "text", btnNext: "افتح كتاب الحب 📖" },
            { title: "مَكَانَتُكِ فِي قَلْبِي", content: "لو كان القلب يُهدى لأهديتكِ قلبي، ولكنه ملككِ منذ أول نبضة وعيتُ فيها وجودكِ. ريماس، أنتِ لستِ مجرد شخص عابر، أنتِ كل أجزاء حياتي.", type: "text" },
            { title: "مَنْ أَنْتِ لِي؟", content: "أنتِ الحلم الذي طال انتظاره وتحقق، والوطن الدافئ الذي ألجأ إليه. حين ألتفت وأجدكِ معي، تتبدد همومي، وأيقن أنكِ أعظم نعمي.", type: "text" },
            { title: "قَصِيدَةُ الغَرَام", content: "أُحبّكِ حُبّاً لو يَفيضُ يَسيرُهُ<br>عَلى الخَلْقِ مَاتَ الخَلْقُ مِنْ شِدّةِ الحُبِّ<br>أنتِ العُيونُ وتِلْكَ النَّبْضَةُ فِي دَمِي<br>وأنتِ الأَمَانُ وبَلْسَمٌ شَافٍ لِلْقَلْبِ", type: "poem" },
            { title: "تَفَاصِيلُكِ المُقَدَّسَة", content: "أعشق ضحكتكِ، نبرة صوتكِ العذبة، طريقتكِ اللطيفة، وحتى صمتكِ. كل تفصيلة صغيرة فيكِ تصنع يوماً كاملاً من البهجة لوسيم.", type: "text" },
            { title: "عَيْنَاكِ مَوْطِنِي", content: "في عينيكِ أرى مدائن من السلام. حين أنظر إليهما، أنسى العالم بأسره، وأغرق في بحر من الطمأنينة لا أريد النجاة منه أبداً.", type: "text" },
            { title: "شِعْرٌ فِي الحُسْن", content: "يا مَنْ حَوَتْ كُلَّ المَحَاسِنِ وَالبَهَا<br>وَتَفَرَّدَتْ بِالحُسْنِ وَالإِشْرَاقِ<br>لَوْلاَكِ مَا عَرَفَ الفُؤَادُ صَبَابَةً<br>وَلاَ ذَاقَ طَعْمَ الشَّوْقِ فِي الأَعْمَاقِ", type: "poem" },
            { title: "نَبْضٌ وَاحِد", content: "نحن لسنا روحين في جسدين، بل روح واحدة تعيش في نبضين. إذا تألمتِ, بكت عيناي، وإذا ابتسمتِ، أشرقت دنياي.", type: "text" },
            { title: "وَقْتِي مَعَكِ", content: "الزمن معكِ يمر كالحلم القصير. أتمنى لو أستطيع إيقاف عقارب الساعة حين أكون بجانبكِ، لأعيش اللحظة معكِ ألف مرة احبك ريماس بجنون.", type: "text" },
            { title: "هَمْسَةُ شَوْق", content: "يَكَادُ الشَّوْقُ يَقْتُلُنِي إِلَيْكِ<br>وَكُلُّ جَوَارِحِي تَهْفُو عَلَيْكِ<br>فَأَنْتِ الرُّوحُ، بَلْ أَنْتِ الحَيَاةُ<br>وَمَا عُمْرِي سِوَى لَحْظَةْ لَدَيْكِ", type: "poem" },
            { title: "مَلِكَةُ القَلْب", content: "توجتكِ ملكةً على عرش قلبي، لا شريك لكِ فيه ولا منازع. أنتِ الحاكمة بأمر الحب، وأنا أسير هواكِ طوعاً واختياراً.", type: "text" },
            { title: "عَهْدُ الوَفَاء", content: "أعاهدكِ أمام الله وقلبي، أن أكون السند الذي لا يميل. حبنا حبل متين يربط أرواحنا كنسيج واحد لا ينقطع.", type: "text" },
            { title: "وَعْدُ العِشْق", content: "أَعِدُكِ أَنْ أَبْقَى عَلَى العَهْدِ وَافِياً<br>وَأَنْ أَحْفَظَ الوِدَّ الَّذِي بَيْنَنَا دَهْرَا<br>فَأَنْتِ الرَّجَاءُ وَأَنْتِ المُنَى كُلُّهَا<br>وَأَنْتِ الضِّيَاءُ إِذَا مَا دَجَى أَسْرَى", type: "poem" },
            { title: "كُلُّ الأَشْيَاءِ أَنْتِ", content: "أنتِ الصباح إذا أشرقت الشمس، وأنتِ القمر إذا حل المساء. أنتِ الفرح في حزني، واليقين في حيرتي، أنتِ ببساطة، كل أشيائي الجميلة.", type: "text" },
            { title: "نُورُ الأَيَّام", content: "يا ريماس، لم أعرف للنور معنى حقيقي إلا حين أشرقتِ في حياتي. أنتِ الشمس التي تبدد غيوم حزني، والضياء الذي يرشدني في عتمة أيامي.", type: "text" },
            { title: "بَدْرُ التَّمَام", content: "تَبَارَكَ مَنْ سَوَّاكِ بَدْراً مُنِيْراً<br>وَأَسْكَنَ فِي عَيْنَيْكِ سِحْراً كَبِيْرَا<br>فَلَوْ أَنَّنِي خُيِّرْتُ فِي مَنْ أُحِبُّهُ<br>لَمَا اخْتَرْتُ إِلَّا كِ رُوْحاً وَمَصِيْرَا", type: "poem" },
            { title: "عِطْرُ الرُّوح", content: "في كل مرة أتنفس فيها، أشعر بأنني أتنفس طيفكِ. أنتِ العطر الذي يملأ زوايا أيامي، ووسيم لا يكتمل أبداً إلا بكِ.", type: "text" },
            { title: "لَحْنُ الخُلُود", content: "صوتكِ يا ريماس ليس مجرد صوت، بل هو معزوفة موسيقيّة أستمع إليها بشغف، لحنٌ يطرب له قلبي وتراقص عليه نبضاتي دون توقف.", type: "text" },
            { title: "سُلْطَانَةُ العِشْق", content: "أَنْتِ الأَمِيْرَةُ وَالزَّمَانُ مُسَخَّرٌ<br>لِرِضَاكِ يَا مَنْ بِالدَّلَالِ تَسَلَّطَتْ<br>رِيمَاسُ يَا لَحْناً يُرَدِّدُهُ الهَوَى<br>كُلُّ الحُرُوفِ أَمَامَ حُسْنِكِ أَسْكَتَت Ly", type: "poem" },
            { title: "يَقِينِي الأَوْحَد", content: "في هذا العالم المليء بالشكوك والمخاوف، أنتِ الحقيقة الوحيدة واليقين الثابت الذي أستند إليه. أنتِ ملجأي وملاذي يا نبض وسيم.", type: "text" },            { title: "جَنَّةُ الأَرْض", content: "يقال أن لكل إنسان جنة يبحث عنها في الأرض، وجنتي وجدتها بين يديكِ، في ابتسامتكِ، وفي دفء قلبكِ الكبير الذي يسعني.", type: "text" },
            { title: "غَيْثُ القُلُوب", content: "كَأَنَّكِ غَيثٌ فِي صَحَارَى مَشَاعِرِي<br>أَحَالَ الجَفَافَ القَاحِلَ اليَوْمَ رَوْضَةَ<br>أُحِبُّكِ حُبّاً جَاوَزَ الوَصْفَ وَالمَدَى<br>وَأَسْأَلُ رَبِّي أَنْ يَدُومَ المَوَدَّةَ", type: "poem" },
            { title: "خُيُوطُ الشَّمْس", content: "دعيني أغازل فيكِ كل شيء، شعركِ، عينيكِ، وحتى غضبكِ الجميل. كل ما فيكِ هو سحر خالص يأسرني يوماً بعد يوم ولا أرتوي منه.", type: "text" },
            { title: "دُعَاءٌ مُسْتَجَاب", content: "لطالما دعوت الله في سري أن يرزقني السعادة المطلقة، فكانت الاستجابة العظيمة على هيئة إنسان.. وكانت الاستجابة أنتِ يا ريماس.", type: "text" },
            { title: "تَاجُ المِلَاح", content: "يَا تَاجَ كُلِّ المِلَاحِ فِي عَيْنِ عَاشِقِهَا<br>وَسِيمُ قَلْبِكِ بِالأَشْوَاقِ قَدْ غَرِقَا<br>أَنْتِ السَّفِينَةُ وَالأَمْوَاجُ تَعْصِفُ بِي<br>وَمِنْ هَوَاكِ رَأَيْتُ السِّحْرَ وَالأَلَقَا", type: "poem" },
            { title: "عَالَمِي الخَاص", content: "لا أحتاج من العالم الواسع شيئاً ما دمتِ بجانبي. أنتِ كوكبي، ومجرتي، وعالمي الخاص الذي أعيش فيه ملكاً متوجاً بحبكِ وعطفكِ.", type: "text" },
            { title: "لُغَةُ العُيُون", content: "حين نعجز عن الكلام، تتحدث أعيننا لغة راقية لا يفهمها سوانا. لغة الحنين، لغة العشق الصافي، ولغة الانتماء الأبدي الذي لا يزول.", type: "text" },
            { title: "نَجْمَةُ اللَّيْل", content: "وَإِنِّي رَأَيْتُكِ نَجْمَةً فِي لَيْلَتِي<br>تَهْدِي خُطَايَ إِذَا الدُّرُوبُ تَظَلَّمُ<br>أَفْدِيكِ بِالرُّوحِ الَّتِي مَلَكَتْ يَدَاكِ<br>وَبِكُلِّ مَا يَحْوِي الفُؤَادُ المُغْرَمُ", type: "poem" },
            { title: "قِصَّةٌ بِلَا حُدُود", content: "حبنا يا ريماس كالبحر الذي لا ساحل له، عميق، غامض، وجميل إلى حد يسرق الأنفاس. وأنا يا حبيبتي محظوظ جداً لأنني أغرق فيه طوعاً.", type: "text" },
            { title: "نِهَايَةٌ لَا تَنْتَهِي", content: "هذا الكتاب لن تُغلق صفحاته أبداً، فكل يوم أعيشه معكِ هو فصل جديد من العشق. دمتِ لي نبضاً يا ريماس، ودمتُ لكِ عاشقاً مدى الحياة.", type: "text" },
            { title: "أَبَدِيَّةُ العِشْق", content: "يقولون أن الحب أعمى، وأنا أقول أن حبكِ هو الذي فتح عيني على جمال الحياة. بدونكِ يا ريماس، وسيم مجرد عابر في ملكوت الصمت والانتظار.", type: "text" },
            { title: "خَفَقَاتُ القَلْب", content: "أَمُرُّ بِاسْمِكِ الدَّافِي فَيَحْمِلُنِي<br>إِلَى دُنْيَا مِنَ الأَشْوَاقِ تُبْحِرُ بِي<br>كَأَنَّ العُمْرَ قَبْلَ هَوَاكِ جَدْبٌ<br>وَأَنْتِ المَطَرُ الحَانِي عَلَى قَلْبِي", type: "poem" },
            { title: "أَنْتِ كُلُّ المَعَانِي", content: "إذا كان للكلمات ثمن، فإن اسمكِ هو أثمن كلمة نطقت بها شفتاي. ريماس، كل حروف اللغة وثقافاتها تعجز عن وصف مقامكِ السامي والثمين في روحي.", type: "text" },
            { title: "مَلَاذُ الرُّوح", content: "إِذَا ضَاقَتْ بِيَ الدُّنْيَا وَجَارَتْ<br>رَأَيْتُ بِعَيْنِكِ اليُمْنَى أَمَانِي<br>فَمَا لِي غَيْرُ حُبِّكِ مِنْ مَلَاذٍ<br>وَمَا لِي غَيْرُ حِضْنِكِ مِنْ مَكَانِ", type: "poem" },
            { title: "عِشْقٌ بلا شروط", content: "أحبكِ لا لشيء، بل لأنكِ أنتِ. لأن في حضوركِ يهدأ صخب العالم الخارجي، وتتحول كل الأشياء المرة إلى عذوبة لا تنتهي في قلبي المتيم بكِ.", type: "text" },
            { title: "حُرُوفٌ مِنَ الذَّهَب", content: "كَتَبْتُكِ فِي صَحِيفَةِ نَبْضِ قَلْبِي<br>حُرُوفاً لَا تُغَيِّرُهَا السِّنُونُ<br>فَأَنْتِ العَدْلُ فِي دُنْيَا المَآسِي<br>وَأَنْتِ الحَقُّ وَالعِشْقُ المَصُونُ", type: "poem" },
            { title: "نَفَحَاتُ الحَنِين", content: "كلما غابت الشمس وحل السكون، تذكرت دفء يديكِ. الشوق إليكِ يا ريماس ليس مجرد شعور عابر، بل هو نبض حثيث يطالبني بأن أكون قربكِ دائماً.", type: "text" },
            { title: "قَمَرُ الأُمْنِيَات", content: "يَا بَدْرَ تِمٍّ فِي سَمَائِي شَارِقاً<br>أَنْقَذْتَ قَلْباً بِالغَرَامِ تَحَيَّرَا<br>رِيمَاسُ يَا رَوْضَ الحَيَاةِ وَأُنْسَهَا<br>مَا كَانَ حُبُّكِ فِي الفُؤَادِ تَصَبُّرَا", type: "poem" },
            { title: "تَوْأَمُ الشَّعُور", content: "قد تتشابه القلوب وتتلاقى الأرواح، لكن قلبي وقلبكِ صُنعا من ذات النور. لا يمكن لمسافة أو زمن أن يغيرا حقيقة أننا نعيش لبعضنا ولأجل بعضنا.", type: "text" },
            { title: "مَوْجُ الغَرَام", content: "رَمَتْنِي فِي بِحَارِ هَوَاكِ عَيْنٌ<br>لَهَا سِحْرٌ يَفُوقُ سَنَا البُرُوقِ<br>فَصِرْتُ أَسِيرَ مَوَدَّتِكِ النَّقِيَّةْ<br>وَتَجْرِي فِي شَرَايِينِي وَعُرُوقِي", type: "poem" },
            { title: "عَهْدٌ لَا يَمُوت", content: "أكتب لكِ هذه الكلمات لتكون شاهداً أبدياً في هذا الكتاب على حبٍّ تجاوز حدود الأرض. سأبقى أحبكِ بنفَس الشغف وبأشواق تولد كل يوم من جديد.", type: "text" },
            { title: "سِحْرُ المَشَاعِر", content: "خُذِي قَلْبِي فَأَنْتِ بِهِ أَحَقُّ<br>وَمَا لِي دُونَ نَبْضِكِ أَيْ عَيْشِ<br>إِذَا أَقْبَلْتِ نَحْوِي فِي دَلَالٍ<br>تَرَاجَعَ عَنْ مَقَامِكِ كُلُّ جَيْشِ", type: "poem" },
            { title: "أَنْتِ الحَيَاة", content: "سألتُ قلبي يوماً عن سر تعلقه الشديد بكِ، فأجابني بنبضة حارقة: هي ليست مجرد حبيبة، هي الأكسجين الروحي الذي يبقيني حياً ونابضاً بالبهجة.", type: "text" },
            { title: "رِيَاضُ الحُب", content: "فِي حُسْنِهَا كُلُّ المَحَاسِنِ جُمِّعَتْ<br>تَمْشِي كَمَا يَمْشِي الغَزَالُ الشَّادِي<br>فَإِذَا رَنَتْ بِالعَيْنِ نَحْوَ مَوَدَّتِي<br>صَارَتْ طُيُورُ السَّعْدِ فِي إِنْشَادِ", type: "poem" },
            { title: "عُمْقُ الانْتِمَاء", content: "أنتِ وطني الصغير، وملاذي الآمن من ضوضاء الحياة ومتاعبها. عندما أكون بجانبكِ، أشعر أنني امتلكت الدنيا بأسرها في كفي ولا أطلب المزيد.", type: "text" },
            { title: "نَبْضَةُ الخُلُود", content: "أُحِبُّكِ كَالتَّرَانِيمِ القَدِيمَةْ<br>تُرَدِّدُهَا الشِّفَاهُ بِكُلِّ شَوْقِ<br>وَعَهْدِي لَنْ يَزُولَ وَلَنْ يَكِلَّ<br>فَأَنْتِ النَّجْمُ فِي الأَفْلَاكِ فَوْقِي", type: "poem" },
            { title: "نُورٌ فِي العَتْمَة", content: "مهما طالت الليالي الباردة، فإن تذكر وجهكِ الصافي يملأ قلبي بنور الأمل والدفء. أنتِ فجر حياتي الدائم وتوأم روحي ونبض وسيم الأبدي.", type: "text" },
            { title: "خَاتِمَةُ الأَشْوَاق", content: "لَوْ كَانَ عُمْرِي فِي يَدِي لَوَهَبْتُهُ<br>لِعَيْنَيْكِ يَا رِيمَاسُ دُونَ تَوَانِ<br>فَأَنْتِ لِي كُلُّ الحَيَاةِ وَأُنْسُهَا<br>وَأَنْتِ لِي نَبْضِي وَكُلُّ كِيَانِي", type: "poem" },
            { title: "حُبٌّ يَتَجَدَّد", content: "مع كل دقيقة تمضي، يولد في أعماقي حب جديد لكِ. ليس لعشقنا سقف، وليس لأشواقي نهاية. أنتِ البداية والوسط والختام المتجدد في كل أوقاتي.", type: "text" },
            { title: "صَوْتُكِ أَمَان", content: "هنا عند الصفحة الخمسين، نعلن أن حب وسيم وريماس كتابٌ مفتوح، لكننا لن نتوقف، فصوتكِ الذي يطرب مسمعي يطالبني بالمزيد، وأنا لا أملك سوى الانصياع لسلطان حبكِ المطلق.", type: "text" },
            { title: "رِسَالَةٌ مِنْ عُمْقِ الرُّوح", content: "يا ريماس، لو أن الكلمات تستطيع أن تحمل جزءاً مما يفيض به قلبي من عشق، لملأت بحور الأرض كلها بأبجدية لا تنتهي. في كل نبضة من نبضاتي هناك نداء خفي يهمس باسمك، وفي كل شهيق أستنشق طيفك ليحيا به كياني. أنتِ لستِ فقط شريكة أيام، بل أنتِ الروح التي تسري في عروقي.", type: "text" },
            { title: "عَهْدُ المَحَبَّةِ", content: "وَإِنِّي وَاللَّهِ أُحِبُّكِ حُبّاً قَاهِراً<br>يَتَجَاوَزُ المَنْطِقَ وَيَخْتَرِقُ الخَيَالَا<br>رِيمَاسُ يَا قِصَّةَ عِشْقٍ أَعِيشُهَا<br>قَدْ فَاقَتْ فِي رَوْعَتِهَا الحُسْنَ وَالجَمَالَا<br>مَا نَبَضَ القَلْبُ لِغَيْرِكِ لَحْظَةً<br>وَكَيْفَ يَنْبِضُ وَقَدْ صِرْتِ لَهُ الكَمَالَا", type: "poem" },
            { title: "اخْتِصَارُ السَّعَادَة", content: "لو طلبوا مني أن أختصر معنى السعادة في كلمة واحدة، لنطقت اسمكِ دون تردد. ريماس، أيتها الروح التي عانقت روحي، والقلب الذي آوى حنيني. في وجودكِ تتلاشى كل همومي، وتصبح الحياة لوحة فنية مرسومة بألوان الفرح. أريدكِ أن تعلمي دائماً أنني هنا لأجلكِ ولن أخذلكِ.", type: "text" },
            { title: "مِحْوَرُ الكَوْن", content: "تدور الأرض حول الشمس، وتدور حروفي وقصائدي حولكِ أنتِ وحدك. كل قصيدة لم تُكتب فيكِ هي مجرد كلمات عابرة، وكل يوم يمر دون أن أرى طيفكِ هو يوم ناقص لا يعترف به تقويمي. لقد تغلغلتِ في أركان وجودي حتى أصبحتِ أنتِ المحور الذي ترتكز عليه كل قراراتي.", type: "text" },
            { title: "لَحْنُ البَقَاء", content: "أَرَاكِ فَأَنْسَى هُمُومَ الزَّمَانِ<br>وَتُزْهِرُ فِي صَحْرَائِي الأَمَانِي<br>فَأَنْتِ الرَّبِيعُ الَّذِي لَا يَغِيبُ<br>وَأَنْتِ قَصِيدَةُ عِشْقِي بِلِسَانِي<br>فَلَا تَبْتَعِدِي عَنْ نَبْضِ وَسِيمٍ<br>فَإِنَّ البُعْدَ عَنْكِ هُوَ الثَّوَانِي", type: "poem" },
            { title: "عَيْنَاكِ مِرْآتِي", content: "عندما أطيل النظر في عينيكِ الجميلتين، لا أرى انعكاس صورتي فقط، بل أرى مستقبلي وحياتي وأحلامي كلها مجتمعة في بؤبؤ عينيكِ. هناك سحر عجيب يشدني إليكِ بقوة خفية، سحر يجعلني أتنازل عن كبريائي أمام عتبة حبكِ راضياً ومبتسماً ومحباً حد الثمالة.", type: "text" },
            { title: "نِصْفِي الأَجْمَل", content: "لا يوجد إنسان كامل، لكنكِ بالنسبة لي كمالي الذي أفتخر به. أنتِ النصف الذي رمم كسوري، وجمّع شتاتي، وأعاد صياغة روحي من جديد. منذ أن دخلتِ حياتي، تغيرت نظرتي لكل شيء، أصبحت أرى الجمال في أبسط التفاصيل لأنكِ تملئين زوايا تفكيري باستمرار.", type: "text" },
            { title: "عِشْقٌ يُزَلْزِلُنِي", content: "كَأَنَّكِ الشَّمْسُ فِي لَيْلِي تُدَثِّرُنِي<br>مِنْ بَرْدِ أَيَّامِي إِذَا مَا الشَّوْقُ بَلَّلَنِي<br>رِيمَاسُ يَا زَهْرَةً فِي القَلْبِ مَنْبَتُهَا<br>لَوْلَا غَرَامُكِ شَوْكُ الوَجْدِ يَقْتُلُنِي<br>سَلَكْتُ دَرْبَ الهَوَى طَوْعاً بِلَا نَدَمٍ<br>لِأَنَّ طَيْفَكِ نَحْوَ النُّورِ يَحْمِلُنِي", type: "poem" },
            { title: "شِفَاءُ الرُّوح", content: "صوتكِ يا حبيبتي هو التميمة التي تحميني من قسوة الأيام. حين تتحدثين، أغمض عيني لأستمتع بكل نبرة وكل حرف يخرج من شفتيكِ. إنه يشبه المطر الذي يغسل روحي من كل تعب، ويجعلني أتنفس بعمق وأشعر بأن الدنيا لا تزال بخير طالما أنني أستمع إلى همساتكِ الدافئة.", type: "text" },
            { title: "سِرُّ السُّعُود", content: "كم من مرة حاولت أن أكتب لكِ رسالة تشرح ما بداخلي، وفي كل مرة أمزق الورق لأن الكلمات تبدو باهتة أمام عظمة شعوري نحوكِ. أنتِ يا ريماس حالة استثنائية لا يمكن حصرها في أبجدية، ولا يمكن رسمها في لوحة، أنتِ سري الجميل الذي أخبئه في أعماق صدري.", type: "text" },
            { title: "رِحْلَةُ الغَرَام", content: "أَسَافِرُ فِي عَيْنَيْكِ دُونَ شِرَاعِ<br>وَأَرْمِي بِأَحْزَانِي إِلَى القَاعِ<br>فَأَنْتِ المَرَاسِي إِذَا هَاجَ بَحْرِي<br>وَأَنْتِ السَّكِينَةُ بَعْدَ الصِّرَاعِ<br>فَبِاللَّهِ رِفْقاً بِقَلْبِ وَسِيمٍ<br>فَإِنَّ هَوَاكِ نِهَايَةُ المَطَاعِ", type: "poem" },
            { title: "إِشْرَاقَةُ أَمَل", content: "في كل فجر جديد، أول طيف يزور مخيلتي هو طيفكِ، وأول اسم ينبض به قلبي هو اسمكِ. أنتِ البداية لكل نهار مشرق، والنهاية لكل ليل هادئ. وجودكِ في تفاصيل يومي يمنحني طاقة إيجابية لا تنضب، ويجعلني أواجه الحياة بابتسامة الواثق الذي يملك أثمن جوهرة في الكون.", type: "text" },
            { title: "نَبْضُ الحَيَاة", content: "حبي لكِ يا ريماس لا يشيخ ولا يهرم، بل يتجدد مع كل قطرة دم تسري في أوردتي. كل مسافة بيننا هي مجرد وهم جغرافي، لأن أرواحنا متعانقة بقوة لا يستطيع أي قانون في الطبيعة أن يفك شفرتها. أنتِ قدري الجميل الذي أسجد لله شكراً على نعمة وجوده في مسيرتي.", type: "text" },
            { title: "مُهْجَةُ الخَاطِر", content: "سَأَلْتُ النُّجُومَ عَنْ سِرِّ هَذَا البَهَاءِ<br>فَقَالَتْ سَنَاهَا كَنُورِ السَّمَاءِ<br>رِيمَاسُ مَلِيكَةُ كُلِّ القُلُوبِ<br>وَتَاجُ المَحَبَّةِ وَكِبْرِيَاءِ<br>وَمَا كُنْتُ قَبْلَكِ أَعْرِفُ حُبّاً<br>فَصِرْتُ بِعِشْقِكِ سَيِّدَ الوَفَاءِ", type: "poem" },
            { title: "رَفِيقَةُ الدَّرْب", content: "أنتِ لستِ فقط حبيبة أشاركها أوقاتي السعيدة، بل أنتِ السند الذي أتكئ عليه عندما تشتد العواصف. في كل خطوة أخطوها نحو مستقبلي، أرى يدكِ تمسك بيدي، وتشجعني للمضي قدماً. حبكِ هو الدافع الأكبر الذي يجعلني أسعى لأكون رجلاً أفضل وأعظم تليق به أميرة مثلكِ.", type: "text" },
            { title: "غَايَةُ المُنَى", content: "لو خيروني بين كنوز الأرض وبين لحظة واحدة أقضيها في تأمل ملامحكِ، لاخترت تلك اللحظة بلا أدنى شك. ففي ملامحكِ أرى كل الجمال الذي خلقه الله في هذا الكون الواسع، وفي ابتسامتكِ أجد الرضا الذي يبحث عنه كل إنسان. أنتِ ثروتي الحقيقية ورأس مالي العاطفي.", type: "text" },
            { title: "شَوْقٌ مُلْتَهِب", content: "يَذُوبُ فُؤَادِي مِنَ الشَّوْقِ وَجْداً<br>وَأَرْجُو لِقَاءَكِ قَصْداً وَعَمْداً<br>فَإِنْ غِبْتِ عَنِّي تَوَارَتْ شُمُوسِي<br>وَإِنْ عُدْتِ عَادَ الزَّمَانُ لِيَ سَعْداً<br>فَدُومِي لِقَلْبِي ضِيَاءً وَنَبْضاً<br>وَدُومِي لِرُوحِي سَلَاماً وَوَرْداً", type: "poem" },
            { title: "حِكَايَةُ الشِّتَاءِ", content: "عندما يحل الشتاء القارس وتتساقط الثلوج، أجد في ذكرى حديثنا الدفء الذي يغنيني عن كل نيران الأرض. كلماتكِ تتسرب إلى قلبي ككوب قهوة ساخن في صباح ممطر، تمنحني النشوة والهدوء في آن واحد. أنتِ يا ريماس فصلي الخامس الذي لا يشبه بقية فصول السنة.", type: "text" },
            { title: "مَلِيكَةُ العَرْش", content: "لا توجد قوة على وجه الأرض تستطيع أن تنزع حبكِ من قلبي، فقد بُني هذا الحب على أساس متين من الاحترام والوفاء والعشق الخالص. لقد تربعتِ على عرش مملكتي الداخلية، وأغلقتِ أبوابها خلفكِ، لتبقي أنتِ الحاكمة الوحيدة التي أطيع أوامرها بشغف وحب ورضا.", type: "text" },
            { title: "نِدَاءُ القُلُوب", content: "أُنَادِيكِ وَالرُّوحُ تَلْهُو بِطَيْفِكِ<br>وَتَرْقُصُ فَرَحاً عَلَى وَقْعِ حَرْفِكِ<br>رِيمَاسُ يَا كُلَّ عُمْرِي البَاقِي<br>حَيَاتِي فِدَاءٌ لِرَوْعَةِ طَرْفِكِ<br>عَلَى عَهْدِنَا سَوْفَ نَمْضِي سَوِيّاً<br>وَلَنْ يَقْطَعَ الدَّرْبَ أَيُّ مُخِيفِ", type: "poem" },            { title: "سَرِيرَةُ النَّقَاءِ", content: "أحب فيكِ طهر قلبكِ وصفاء نيتكِ، أحب تلك الروح الطفولية البريئة التي تسكنكِ وتجعلني أشعر بأنني أمام ملاك نزل من السماء ليمسح عني غبار الحياة. أنتِ النقاء الذي أبحث عنه في عالم مليء بالزيف، وأنتِ الصدق الذي أؤمن به دون أن أحتاج إلى أي براهين أو أدلة.", type: "text" },
            { title: "عُنْوَانُ الحَيَاة", content: "لقد حفظت كل تفاصيلكِ عن ظهر قلب، من طريقة حديثكِ، إلى حركة يديكِ، إلى تلك النظرة الخجولة التي تخطف أنفاسي. كل هذه التفاصيل محفورة في ذاكرتي ولن تمحى أبداً. أنتِ لستِ جزءاً من حياتي، بل أنتِ الحياة بكامل تفاصيلها وألوانها وتناقضاتها وجمالها الصارخ.", type: "text" },
            { title: "عِطْرُ القَصَائِد", content: "إِلَيْكِ تَزِفُّ القَوَافِي حَنِينَاً<br>وَتَنْبِضُ بِالحُبِّ شَوْقاً مَتِينَا<br>فَأَنْتِ المَعَانِي الَّتِي لَا تَشِيخُ<br>وَأَنْتِ الَّتِي زَيَّنَتْ لِي السِّنِينَا<br>وَسِيمٌ مُحِبٌّ بِقَلْبٍ صَدُوقٍ<br>وَمَا زَالَ فِي العِشْقِ عَهْداً أَمِينَا", type: "poem" },
            { title: "مُعْجِزَةُ القَدَر", content: "كثيراً ما أسأل نفسي: كيف تمكنتِ من اختراق حصوني بهذه السهولة والسرعة؟ الجواب ببساطة هو أن الأرواح جنود مجندة، وروحي قد عرفت روحكِ وعانقتها قبل أن تلتقي أعيننا. هذا الانسجام العجيب بيننا ليس صدفة، بل هو ترتيب إلهي عظيم ليجمع بين قلبين خلقا ليكونا معاً.", type: "text" },
            { title: "جَوْهَرَةُ الأَيَّام", content: "في زحمة الأيام وتراكم المسؤوليات، تبقى فكرة وجودكِ في حياتي هي الملاذ الذي يمنحني الراحة النفسية. مجرد التفكير في أن هناك شخصاً مثلكِ يحمل لي كل هذا الحب، يزيل عن كاهلي أطنان التعب. أنتِ يا ريماس الجوهرة الثمينة التي أضعها تاجاً على رأسي وأفاخر بها العالم.", type: "text" },
            { title: "شَهْدُ الحَدِيث", content: "وَيَا لَيْتَ كُلَّ الدُّرُوبِ إِلَيْكِ<br>وَكُلَّ الأَمَانِي بَيْنَ يَدَيْكِ<br>رِيمَاسُ يَا شَهْدَ هَذَا الزَّمَانِ<br>تَبَارَكَ مَنْ أَوْدَعَ السِّحْرَ فِيكِ<br>إِذَا مَا ابْتَسَمْتِ يُضِيءُ الوُجُودُ<br>وَتَهْفُو الرَّيَاحِينُ شَوْقاً إِلَيْكِ", type: "poem" },
            { title: "لَوْحَةُ العُشَّاق", content: "حبنا هو لوحة فنية نرسمها كل يوم بألوان الثقة والاحترام والمودة. لم نترك لوناً من ألوان السعادة إلا وزيناها به. وأنا على يقين تام بأن هذه اللوحة ستظل خالدة، تتحدى الزمن وتتحدى كل الصعوبات، لأن الأيدي التي رسمتها متشابكة بقوة لا يمكن أن ترتخي أبداً.", type: "text" },
            { title: "نِهَايَةُ البَحْث", content: "قبل أن أعرفكِ، كنت كالمسافر الذي يبحث عن وطن يؤويه، وحين التقيتكِ، ألقيت عصا الترحال وأيقنت أن رحلتي قد انتهت عند شواطئ قلبكِ. هنا أود أن أستقر، وهنا أود أن أبني أحلامي، وهنا بجانبكِ أود أن أقضي ما تبقى من عمري، حارساً لقلبكِ وعاشقاً لروحكِ.", type: "text" },
            { title: "عَهْدٌ حَتَّى الشَّيْب", content: "سَأَبْقَى أُحِبُّكِ حَتَّى المَشِيبِ<br>وَحَتَّى يُوَارَى التُّرَابُ حَبِيبِي<br>فَلَا المَوْتُ يُنْهِي غَرَامِي بِكُمْ<br>وَلَا البُعْدُ يُطْفِئُ نَارَ اللَّهِيبِ<br>فَأَنْتِ لِرُوحِي نَعِيمٌ مُقِيمٌ<br>وَأَنْتِ لِقَلْبِي كَظِلٍّ رَحِيبِ", type: "poem" },
            { title: "بَصْمَةُ الخُلُود", content: "وها نحن في الصفحة الثمانين، وما زال في جعبة وسيم آلاف الكلمات التي لم تُكتب بعد. هذا الكتاب هو جزء بسيط من بحر عشقي لكِ يا ريماس. سيبقى هذا الرابط الأبدي يجمعنا، في كل نبضة، وفي كل دقيقة، لنؤكد للعالم أن حبنا هو قصة خلود لا تعرف النهاية.", type: "text" },
            { title: "مَا وَرَاءَ الكَلِمَات", content: "وصلنا إلى ما بعد الثمانين، ولم أعد أملك حبراً يكفي لوصفكِ. لكنني سأجعل من نبضات قلبي حبراً، ومن أنفاسي ورقاً، لأكتبكِ في كل مكان يتجاوز حدود هذا الكتاب الرقمي.", type: "text" },
            { title: "سِفْرُ الأَسْرَار", content: "بيننا أسرار لا يعرفها أحد، همسات تبادلناها في الظلام، وضحكات اختلسناها في وضح النهار. هذه الأسرار هي الكنز الذي لا يمكن لأي لص أن يسرقه منا.", type: "text" },
            { title: "جَذْوَةُ الشَّغَف", content: "لَا تَظُنِّي أَنَّ الحُبَّ يَهْدَأُ مَعَ الزَّمَنِ<br>فَشَغَفِي بِكِ يَزْدَادُ اشْتِعَالاً كُلَّ حِينِ<br>رِيمَاسُ يَا نَاراً لَا تُحْرِقُ بَلْ تُنِيرُ<br>دَرْبَ وَسِيمٍ فِي ظُلُمَاتِ السِّنِينِ", type: "poem" },
            { title: "مِينَاءُ الأَمَان", content: "حين تضطرب أمواج الحياة وتشتد الرياح، يكون حضنكِ هو الميناء الوحيد الذي أرسي فيه سفينة عمري. لا خوف معكِ، ولا قلق، فقط سلام يلفني من رأسي حتى قدمي.", type: "text" },
            { title: "تَرَاتِيلُ العِشْق", content: "أردّد اسمكِ كتعويذة سحرية تطرد الشر عن حياتي. ريماس... ريماس... كم من مرة نطقته فسكنت روحي واطمأن قلبي. أنتِ الدعاء المستجاب الذي لا أملّ من ترديده.", type: "text" },
            { title: "فَوْقَ السَّحَاب", content: "حُبُّكِ يَرْفَعُنِي فَوْقَ السَّحَابِ<br>فَأَرَى الدُّنْيَا صَغِيرَةً تَحْتَ قَدَمَيَّ<br>لَا شَيْءَ يَعْنِي لِي سِوَى عَيْنَيْكِ<br>وَلَا قِمَّةَ أَرْجُو إِلَّا رِضَاكِ عَلَيَّ", type: "poem" },
            { title: "صَدَى الرُّوح", content: "كلما ناديتِني، يجيبكِ شيء في داخلي قبل أن ينطق لساني. نحن متصلان بخيط غير مرئي من المشاعر، يجعلنا نشعر ببعضنا البعض حتى في أقصى درجات الصمت والبعد.", type: "text" },
            { title: "مَعْبَدُ الحُب", content: "قلبي معبدٌ لا يُعبد فيه إلا حبكِ. صلواتي هي التفكير فيكِ، وتسبيحي هو حمد الله على وجودكِ. أنتِ الديانة الوحيدة التي أؤمن بها وأعيش لأجلها.", type: "text" },
            { title: "نَشِيدُ الخُلُود", content: "سَنَكْتُبُ اسْمَيْنَا عَلَى جَبِينِ الزَّمَنِ<br>رِيمَاسُ وَسِيمٌ.. قِصَّةٌ لَا تَفْنَى<br>يَتَنَاوَلُهَا العُشَّاقُ بَعْدَ أَلْفِ عَامٍ<br>وَيَقُولُونَ: هَذَا حُبٌّ حَقِيقِيٌّ وَمَعْنَى", type: "poem" },
            { title: "أَنْتِ القَدَر", content: "لم يكن لقاءكِ صدفة، ولم يكن حبكِ خياراً. كان قدراً محتوماً كُتب في اللوح المحفوظ قبل أن نُخلق. أنا لم أختركِ، بل اختاركِ قلبي قبل أن يختاره عقلي.", type: "text" },
            { title: "سِحْرُ الغِيَاب", content: "حتى غيابكِ جميل، لأنه يذكّرني بمدى حاجتي إليكِ. في البعد أكتشف أبعاداً جديدة لحبي، وفي الشوق أتأكد أن جذور عشقكِ قد اخترقت صخور قلبي إلى الأبد.", type: "text" },
            { title: "تَاجُ المَلِكَة", content: "لَنْ أَخْلَعَ عَنْكِ تَاجَ المُلْكِ يَوْماً<br>فَأَنْتِ المَلِكَةُ فِي عَرْشِ فُؤَادِي<br>وَسِيمٌ عَبْدُكِ فِي الحُبِّ طَوْعاً<br>يَسْعَدُ بِالْقَيْدِ وَبِالأَغْلَالِ", type: "poem" },
            { title: "لُغَةُ الصَّمْت", content: "حين تعجز الكلمات، يتحدث الصمت بلغتنا الخاصة. نظرة واحدة تكفيني لفهم ما يدور في ذهنكِ، ولمسة يد كفيلة بنقل كل ما يعجز اللسان عن قوله. نحن نتجاوز حدود اللغة.", type: "text" },
            { title: "أُفُقُ الأَمَل", content: "معكِ، المستقبل ليس مخيفاً بل هو وعد بالسعادة. أبني خطط حياتي وأنا واضعٌ صورتكِ أمام عيني، فأنتِ الهدف وأنتِ الغاية وأنتِ الحافز للاستمرار.", type: "text" },
            { title: "قَسَمُ الأَبَد", content: "أُقْسِمُ بِرَبِّ السَّمَاءِ وَالأَرْضِ<br>أَلَّا أُحِبَّ سِوَاكِ مَا دُمْتُ حَيّاً<br>رِيمَاسُ يَا قَسَماً لَا يُنْقَضُ أَبَداً<br>حُبُّكِ فِي رُوحِي سَيَبْقَى نَقِيّاً", type: "poem" },
            { title: "مِرْآةُ الصِّدْق", content: "أنتِ المرآة التي أرى فيها أجمل نسخة من نفسي. حبكِ يصقل روحي ويجعلني إنساناً أفضل. بفضلِكَ أتعلم كل يوم كيف أكون أكثر عطفاً وأكثر صدقاً.", type: "text" },
            { title: "وَاحَةُ العُشَّاق", content: "في صحراء الحياة القاحلة، أنتِ الواحة التي ارتوي منها. ظلكِ يحميني من حرّ الأيام، وماؤكِ العذب يروي عطش روحي. لا حياة لي بعيداً عن واحة حبكِ.", type: "text" },
            { title: "خَاتَمُ العَهْد", content: "هَذَا الكِتَابُ يَشْهَدُ عَلَى عَهْدِنَا<br>عَهْدٍ لَا يَنْقُضُهُ زَمَنٌ وَلَا مَكَانُ<br>رِيمَاسُ أَنْتِ الحُبُّ فِي أَبْهَى صُورِهِ<br>وَسِيمُ لَكِ عَبْداً فِي الحُبِّ مُذْعَانُ", type: "poem" },
            { title: "النُّورُ السَّرْمَدِي", content: "لن ينطفئ نور حبكِ أبداً، فهو سراجٌ وهاجٌ في أعماقي. حتى لو انطفأت نجوم السماء، سيظل قلبكِ ينير دربي. أنتِ النور السرمدي الذي لا يغيب.", type: "text" },
            { title: "الخِتَامُ.. بِدَايَةٌ جَدِيدَة", content: "وصولنا للصفحة المئة ليس نهاية، بل هو بداية لعهد جديد من العشق المتجدد. هذا الرقم يرمز للكمال، وحبكِ هو الكمال بعينه. أحبك يا ريماس، وسأظل أحبك في كل صفحة من صفحات العمر القادمة. ❤️🔐♾️", type: "text", btnNext: "أعِد القراءة من جديد 🔄" }
        ];

        // --- نظام الذكاء الاصطناعي للتجدد التلقائي ---
        let aiGeneratedPages = JSON.parse(localStorage.getItem('waseemReemasAI_Pages') || '[]');

        async function checkAndGenerateAIPages() {
            if (OPENROUTER_API_KEY === "ضع_مفتاحك_الجديد_هنا") { renderAllPages(); return; }
            
            const now = new Date();
            const daysPassed = Math.floor((now - BOOK_START_DATE) / (1000 * 60 * 60 * 24));
            const cyclesPassed = Math.floor(daysPassed / CYCLE_DAYS);
            const expectedAIPages = cyclesPassed * NEW_PAGES_PER_CYCLE;
            
            if (aiGeneratedPages.length >= expectedAIPages) { renderAllPages(); return; }
            
            const pagesToGenerate = Math.min(NEW_PAGES_PER_CYCLE, expectedAIPages - aiGeneratedPages.length);
            if (pagesToGenerate <= 0) { renderAllPages(); return; }
            
            document.getElementById('aiLoading').style.display = 'block';
                        try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "google/gemma-2-9b-it:free",
                        messages: [{
                            role: "user",
                            content: `اكتب ${pagesToGenerate} صفحات حب عاطفية وشعرية باللغة العربية الفصحى لكتاب حب بين "وسيم" و"ريماس". كل صفحة يجب أن تكون مستقلة بعنوان فريد ومحتوى مختلف تماماً عن الصفحات السابقة. أرجع النتيجة حصراً بصيغة JSON array بهذا الشكل بالضبط: [{"title":"عنوان الصفحة","content":"محتوى الصفحة","type":"text أو poem"}]. لا تضف أي نص أو شرح خارج الـ JSON.`
                        }]
                    })
                });
                
                const data = await response.json();
                const aiText = data.choices[0].message.content;
                const jsonMatch = aiText.match(/\[[\s\S]*\]/);
                
                if (jsonMatch) {
                    const newPages = JSON.parse(jsonMatch[0]);
                    aiGeneratedPages = [...aiGeneratedPages, ...newPages];
                    localStorage.setItem('waseemReemasAI_Pages', JSON.stringify(aiGeneratedPages));
                }
            } catch (err) {
                console.error("خطأ في الاتصال بالذكاء الاصطناعي:", err);
            } finally {
                document.getElementById('aiLoading').style.display = 'none';
                renderAllPages();
            }
        }

        // --- دالة عرض جميع الصفحات ---
        function renderAllPages() {
            const allPages = [...basePages, ...aiGeneratedPages];
            const container = document.getElementById('pages-container');
            container.innerHTML = '';
            const totalPages = allPages.length;
            
            allPages.forEach((page, index) => {
                const pageNum = index + 1;
                const isFirst = index === 0;
                const isLast = index === allPages.length - 1;
                const contentHTML = page.type === 'poem' ? `<div class="poem-text">${page.content}</div>` : `<p class="content-text">${page.content}</p>`;
                let buttonsHTML = '<div class="btn-group">';
                if (!isFirst) buttonsHTML += `<button onclick="showPage(${pageNum - 1})">السابق</button>`;
                const nextBtnText = page.btnNext || 'اقلب الصفحة';
                const nextAction = isLast ? 1 : pageNum + 1;
                buttonsHTML += `<button onclick="showPage(${nextAction})">${nextBtnText}</button></div>`;                const randomUsers = Math.floor(Math.random() * (7 - 3 + 1)) + 3;
                const jumpNavHTML = `<div class="jump-nav"><label>انتقل لصفحة:</label><input type="number" min="1" max="${totalPages}" placeholder="#" onkeypress="if(event.key==='Enter') jumpToPage(this)"><button onclick="jumpToPage(this.previousElementSibling)">ذهاب</button></div>`;
                
                container.innerHTML += `<div id="page${pageNum}" class="page ${isFirst ? 'active' : ''}"><div class="heart-container"><div class="heart-wrapper"><svg viewBox="0 0 32 29.6" class="svg-heart"><path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/></svg><div class="name-text">ريماس</div></div><div class="rope"></div><div class="heart-wrapper"><svg viewBox="0 0 32 29.6" class="svg-heart"><path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/></svg><div class="name-text">وسيم</div></div></div><h1>${page.title}</h1>${contentHTML}${buttonsHTML}<div class="page-number">صفحة ${pageNum} من ${totalPages}</div>${jumpNavHTML}<div class="live-users-counter"><svg class="mini-heart" viewBox="0 0 32 29.6"><path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/></svg><span>يتصفح هذا الكتاب الآن:</span><span class="user-count-badge">${randomUsers} أشخاص</span></div></div>`;
            });
        }

        function showPage(pageNumber) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById('page' + pageNumber);
            if (target) {
                target.classList.add('active');
                const rect = target.getBoundingClientRect();
                createExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2, 30);
            }
        }

        function jumpToPage(inputElement) {
            const allPages = [...basePages, ...aiGeneratedPages];
            const val = parseInt(inputElement.value);
            if (val >= 1 && val <= allPages.length) {
                showPage(val);
                inputElement.value = '';
            } else {
                alert(`يرجى إدخال رقم صحيح بين 1 و ${allPages.length}`);
                inputElement.focus();
            }
        }
        
        renderAllPages();
    </script>
</body>
</html>
